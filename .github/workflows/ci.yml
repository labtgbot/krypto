name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  php:
    name: PHP syntax and tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Audit Composer dependencies
        run: composer audit --locked --abandoned=fail

      - name: Validate first-party PHP syntax
        run: php scripts/lint_php.php

      - name: Run automated tests
        run: php scripts/run_tests.php

  playwright:
    name: Playwright public swap e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Audit Node dependencies
        run: npm run audit:dependencies

      - name: Build frontend assets
        run: npm run build:assets

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright public swap e2e
        run: npm run test:e2e
